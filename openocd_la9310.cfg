# =========================================================================
# OpenOCD Configuration File for NXP Layerscape Access LA9310 (Cortex-M4)
# =========================================================================

# -------------------------------------------------------------------------
# 1. HARDWARE INTERFACE CONFIGURATION
# Un-comment ONLY ONE adapter block that matches your physical JTAG probe.
# -------------------------------------------------------------------------

# SEGGER J-Link
source [find interface/jlink.cfg]

# FTDI-based Probe
# source [find interface/ftdi/ft2232h.cfg]

# CMSIS-DAP Compliant Debugger
#source [find interface/cmsis-dap.cfg]

transport select jtag

# -------------------------------------------------------------------------
# 2. TARGET CONFIGURATION (NXP LA9310)
# -------------------------------------------------------------------------
if { [info exists CHIPNAME] } {
   set _CHIPNAME $CHIPNAME
} else {
   set _CHIPNAME la9310
}

# Standard CoreSight JTAG TAP ID for Cortex-M4
# (Can be overwritten using '-set CPUTAPID 0x...' if an alternative revision is used)
if { [info exists CPUTAPID] } {
   set _CPUTAPID $CPUTAPID
} else {
   #set _CPUTAPID 0x0008201D
   set _CPUTAPID 0x6ba00477
}

# Declare the JTAG TAP (Instruction Register length for CM4 is 4 bits)
jtag newtap $_CHIPNAME cpu -irlen 4 -ircapture 0x1 -irmask 0xf -expected-id $_CPUTAPID

# Create the CoreSight Debug Access Port (DAP)
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

# Define the Target core: Arm Cortex-M4 attached to Access Port 0 (AP0)
target create $_CHIPNAME.m4 cortex_m -dap $_CHIPNAME.dap -ap-num 0

# -------------------------------------------------------------------------
# 3. SPEED & RESET ADJUSTMENTS
# -------------------------------------------------------------------------
# LA9310 M4 core operates at up to 307.2 MHz.
# Keep JTAG clock frequency safe and reliable (2000 kHz is widely stable).
adapter speed 2000

# Handle Reset Configuration
reset_config srst_only
adapter srst delay 200

# -------------------------------------------------------------------------
# 4. GDB WORKSPACE EXTRACTION (Optional optimization)
# Allows fast firmware loading by defining a safe area in SRAM for the M4
# -------------------------------------------------------------------------
#$_CHIPNAME.m4 configure -work-area-phys 0x1FFC0000 -work-area-size 0x4000 -work-area-backup 0
